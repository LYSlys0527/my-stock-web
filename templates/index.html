        // 動態生成個股相關權證/美股選擇權的模擬數據
        function generateDerivatives(ticker, currentPrice, stockPctChange, isUS) {
            const list = [];
            const codeNum = ticker.split('.')[0];
            
            if (!isUS) {
                // 台灣權證 (3 檔認購看多，3 檔認售看空)
                const callStrikes = [currentPrice * 1.05, currentPrice * 1.10, currentPrice * 1.15];
                const callNames = ['群益38購01', '凱基38購02', '富邦39購01'];
                const callCodes = ['032481', '032482', '032599'];
                
                callStrikes.forEach((strike, i) => {
                    const multiplier = 0.05; 
                    const intrinsic = Math.max(0, currentPrice - strike);
                    const timeValue = currentPrice * 0.015 * (3 - i); 
                    const warrantPrice = Math.max(0.01, (intrinsic + timeValue) * multiplier);
                    const leverage = 6 - i;
                    const pctChange = stockPctChange * leverage;
                    
                    list.push({
                        code: callCodes[i],
                        name: `${codeNum}${callNames[i]}`,
                        type: '看多',
                        strike: strike,
                        price: warrantPrice,
                        pctChange: pctChange
                    });
                });
                
                const putStrikes = [currentPrice * 0.95, currentPrice * 0.90, currentPrice * 0.85];
                const putNames = ['群益38售01', '元大38售03', '國泰39售01'];
                const putCodes = ['03248P', '03252P', '03261P'];
                
                putStrikes.forEach((strike, i) => {
                    const multiplier = 0.05;
                    const intrinsic = Math.max(0, strike - currentPrice);
                    const timeValue = currentPrice * 0.015 * (3 - i);
                    const warrantPrice = Math.max(0.01, (intrinsic + timeValue) * multiplier);
                    const leverage = 5 - i;
                    const pctChange = -stockPctChange * leverage;
                    
                    list.push({
                        code: putCodes[i],
                        name: `${codeNum}${putNames[i]}`,
                        type: '看空',
                        strike: strike,
                        price: warrantPrice,
                        pctChange: pctChange
                    });
                });
            } else {
                // 美股選擇權 Options
                const callStrikes = [currentPrice * 1.02, currentPrice * 1.05, currentPrice * 1.10];
                const expiry = '260717';
                
                callStrikes.forEach((strike, i) => {
                    const intrinsic = Math.max(0, currentPrice - strike);
                    const timeValue = currentPrice * 0.025 * (3 - i);
                    const optionPrice = Math.max(0.05, intrinsic + timeValue);
                    const leverage = 8 - i * 2;
                    const pctChange = stockPctChange * leverage;
                    
                    list.push({
                        code: `${codeNum}${expiry}C${(strike*1000).toString().padStart(8,'0')}`,
                        name: `${codeNum} 看漲選擇權`,
                        type: '看多',
                        strike: strike,
                        price: optionPrice,
                        pctChange: pctChange
                    });
                });
                
                const putStrikes = [currentPrice * 0.98, currentPrice * 0.95, currentPrice * 0.90];
                putStrikes.forEach((strike, i) => {
                    const intrinsic = Math.max(0, strike - currentPrice);
                    const timeValue = currentPrice * 0.025 * (3 - i);
                    const optionPrice = Math.max(0.05, intrinsic + timeValue);
                    const leverage = 7 - i * 2;
                    const pctChange = -stockPctChange * leverage;
                    
                    list.push({
                        code: `${codeNum}${expiry}P${(strike*1000).toString().padStart(8,'0')}`,
                        name: `${codeNum} 看跌選擇權`,
                        type: '看空',
                        strike: strike,
                        price: optionPrice,
                        pctChange: pctChange
                    });
                });
            }
            return list;
        }

        // 金額格式化
        function formatMoney(value) {
            if (Math.abs(value) >= 1e12) return (value / 1e12).toFixed(1) + '兆';
            if (Math.abs(value) >= 1e8) return (value / 1e8).toFixed(1) + '億';
            if (Math.abs(value) >= 1e4) return (value / 1e4).toFixed(0) + '萬';
            return value.toString();
        }

        // 自選股邏輯
        function updateStarBtnState() {
            let watchlist = JSON.parse(localStorage.getItem('watchlist_stocks')) || [];
            const isAdded = watchlist.includes(activeFinalTicker);
            const starBtn = document.getElementById('star-btn');
            if (starBtn) {
                starBtn.innerText = isAdded ? '★' : '☆';
            }
        }
        
        function toggleWatchlist() {
            if (!activeFinalTicker) return;
            let watchlist = JSON.parse(localStorage.getItem('watchlist_stocks')) || [];
            if (watchlist.includes(activeFinalTicker)) {
                watchlist = watchlist.filter(t => t !== activeFinalTicker);
            } else {
                watchlist.push(activeFinalTicker);
            }
            localStorage.setItem('watchlist_stocks', JSON.stringify(watchlist));
            updateStarBtnState();
            updateWatchlistPrices();
        }

        async function updateWatchlistPrices() {
            let watchlist = JSON.parse(localStorage.getItem('watchlist_stocks')) || [];
            const listEl = document.getElementById('watchlistList');
            if (watchlist.length === 0) {
                listEl.innerHTML = '<div class="no-history">暫無自選股</div>';
                return;
            }
            
            try {
                const currentOrigin = window.location.origin;
                const tickersStr = watchlist.join(',');
                const response = await fetch(`${currentOrigin}/api/watchlist_prices?tickers=${tickersStr}`);
                const resJson = await response.json();
                
                if (resJson.stocks) {
                    listEl.innerHTML = '';
                    resJson.stocks.forEach(stock => {
                        const li = document.createElement('li');
                        li.className = 'history-item';
                        li.style.flexDirection = 'column';
                        li.style.gap = '4px';
                        
                        const isUS = !stock.symbol.endsWith('.TW') && !stock.symbol.endsWith('.TWO');
                        const colorUp = isUS ? '#26a69a' : '#ff4a4a';
                        const colorDown = isUS ? '#ff4a4a' : '#26a69a';
                        const sign = stock.change > 0 ? '+' : '';
                        
                        const isLimitUp = !isUS && (stock.upLimit ? (stock.price >= stock.upLimit - 0.01) : (stock.pctChange >= 9.9));
                        const isLimitDown = !isUS && (stock.downLimit ? (stock.price <= stock.downLimit + 0.01) : (stock.pctChange <= -9.9));
                        
                        let priceStyle = `color: ${stock.change > 0 ? colorUp : (stock.change < 0 ? colorDown : '#e1e2e6')}; font-weight: bold; font-family: monospace; transition: all 0.2s;`;
                        let pctStyle = `color: ${stock.change > 0 ? colorUp : (stock.change < 0 ? colorDown : '#e1e2e6')}; font-family: monospace;`;
                        let limitBadge = '';
                        
                        if (isLimitUp) {
                            priceStyle = `background-color: #ff4a4a; color: #ffffff; font-weight: bold; font-family: monospace; padding: 1px 4px; border-radius: 3px;`;
                            pctStyle = `color: #ff4a4a; font-family: monospace; font-weight: bold;`;
                            limitBadge = `<span style="background-color: #ff4a4a; color: #ffffff; font-size: 9px; padding: 1px 3px; border-radius: 3px; font-weight: bold; margin-left: 4px;">漲停</span>`;
                        } else if (isLimitDown) {
                            priceStyle = `background-color: #26a69a; color: #ffffff; font-weight: bold; font-family: monospace; padding: 1px 4px; border-radius: 3px;`;
                            pctStyle = `color: #26a69a; font-family: monospace; font-weight: bold;`;
                            limitBadge = `<span style="background-color: #26a69a; color: #ffffff; font-size: 9px; padding: 1px 3px; border-radius: 3px; font-weight: bold; margin-left: 4px;">跌停</span>`;
                        }
                        
                        let shortName = stock.name.split(' (')[0];
                        if (shortName.length > 8) shortName = shortName.substring(0, 8) + '...';
                        
                        li.innerHTML = `
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                                <span style="font-weight: bold; color: #fff;">${stock.symbol.split('.')[0]}</span>
                                <span style="${priceStyle}">${stock.price.toFixed(2)}</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; width: 100%; font-size: 11px; align-items: center; margin-top: 2px;">
                                <span style="color: #70737d;">${shortName}${limitBadge}</span>
                                <span style="${pctStyle}">${sign}${stock.pctChange.toFixed(2)}%</span>
                            </div>
                        `;
                        li.onclick = () => {
                            document.getElementById('symbol').value = stock.symbol;
                            updateChart(true);
                        };
                        listEl.appendChild(li);
                    });
                }
            } catch (e) {
                console.error("更新自選股價格失敗:", e);
            }
        }

        // 搜尋紀錄邏輯
        function saveToHistory(symbol, isTW) {
            let history = JSON.parse(localStorage.getItem('stock_history')) || [];
            history = history.filter(item => item.symbol !== symbol);
            history.unshift({ symbol: symbol, isTW: isTW });
            if (history.length > 5) history = history.slice(0, 5);
            localStorage.setItem('stock_history', JSON.stringify(history));
            renderHistoryList();
        }

        function renderHistoryList() {
            const listEl = document.getElementById('historyList');
            let history = JSON.parse(localStorage.getItem('stock_history')) || [];
            if (history.length === 0) { listEl.innerHTML = '<div class="no-history">無搜尋紀錄</div>'; return; }
            listEl.innerHTML = '';
            history.forEach(item => {
                const li = document.createElement('li'); li.className = 'history-item';
                const marketText = item.isTW ? '台股' : '美股';
                li.innerText = `${item.symbol} (${marketText})`;
                li.onclick = () => {
                    document.getElementById('symbol').value = item.symbol;
                    updateChart(true);
                };
                listEl.appendChild(li);
            });
        }

        document.getElementById('symbol').addEventListener('keydown', (event) => {
            if (event.key === 'Enter') { event.preventDefault(); updateChart(true); }
        });

        const canvas = document.getElementById('stockCanvas');
        
        canvas.addEventListener('click', (event) => {
            if (viewMode !== 'derivatives') return;
            
            const rect = canvas.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            const clickY = event.clientY - rect.top;
            
            const padding = { top: 40, bottom: 20, left: 20, right: 20 };
            const cardW = (canvas.width - padding.left - padding.right - 45) / 4;
            const cardH = 65;
            
            // 1. Check if clicked on global futures card
            const cardTop = 38;
            const futures = (window.futuresData && window.futuresData.futures) ? window.futuresData.futures : [];
            for (let i = 0; i < 4; i++) {
                const f = futures[i];
                if (!f || !f.symbol) continue;
                const x = padding.left + i * (cardW + 15);
                if (clickX >= x && clickX <= x + cardW && clickY >= cardTop && clickY <= cardTop + cardH) {
                    // Clicked on a futures card!
                    document.getElementById('symbol').value = f.symbol;
                    switchViewMode('intraday');
                    updateChart(true);
                    return;
                }
            }
            
            // 2. Check if clicked on stock futures card
            const stockCardTop = 138;
            const stockFutures = getStockFuturesData();
            for (let i = 0; i < 2; i++) {
                const sf = stockFutures[i];
                const x = padding.left + i * (cardW + 15);
                if (clickX >= x && clickX <= x + cardW && clickY >= stockCardTop && clickY <= stockCardTop + cardH) {
                    // Clicked on a stock futures card!
                    document.getElementById('symbol').value = sf.symbol;
                    switchViewMode('intraday');
                    updateChart(true);
                    return;
                }
            }
            
            // 3. Check if clicked on a warrant/option row
            const isUS = isUSMarket();
            let currentPrice = 100;
            let stockPctChange = 0;
            if (intradayData && intradayData.points && intradayData.points.length > 0) {
                currentPrice = intradayData.points[intradayData.points.length - 1].price;
                const prevClose = intradayData.prevClose || currentPrice;
                stockPctChange = ((currentPrice - prevClose) / prevClose) * 100;
            }
            const derivativesList = generateDerivatives(activeFinalTicker, currentPrice, stockPctChange, isUS);
            
            const derivTop = 225;
            const tableTop = derivTop + 15;
            const rowH = 26;
            
            derivativesList.forEach((d, idx) => {
                const y = tableTop + rowH + idx * rowH;
                if (clickX >= padding.left && clickX <= canvas.width - padding.right && clickY >= y && clickY <= y + rowH) {
                    // Clicked on a derivative row!
                    if (!isUS) {
                        // Taiwan warrants: do nothing!
                        return;
                    }
                    // US options: click to view option chart
                    document.getElementById('symbol').value = d.code;
                    switchViewMode('intraday');
                    updateChart(true);
                }
            });
        });

        canvas.addEventListener('mousemove', (event) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = event.clientX - rect.left; 
            mouseY = event.clientY - rect.top; 
            
            // Check if cursor should be pointer in derivatives mode
            let shouldBePointer = false;
            if (viewMode === 'derivatives') {
                const padding = { top: 40, bottom: 20, left: 20, right: 20 };
                const cardW = (canvas.width - padding.left - padding.right - 45) / 4;
                const cardH = 65;
                
                // Index Futures Cards
                const cardTop = 38;
                for (let i = 0; i < 4; i++) {
                    const x = padding.left + i * (cardW + 15);
                    if (mouseX >= x && mouseX <= x + cardW && mouseY >= cardTop && mouseY <= cardTop + cardH) {
                        shouldBePointer = true;
                    }
                }
                
                // Stock Futures Cards
                const stockCardTop = 138;
                for (let i = 0; i < 2; i++) {
                    const x = padding.left + i * (cardW + 15);
                    if (mouseX >= x && mouseX <= x + cardW && mouseY >= stockCardTop && mouseY <= stockCardTop + cardH) {
                        shouldBePointer = true;
                    }
                }
                
                // Table Rows (only US options are clickable/pointer)
                const isUS = isUSMarket();
                if (isUS) {
                    let currentPrice = 100;
                    let stockPctChange = 0;
                    if (intradayData && intradayData.points && intradayData.points.length > 0) {
                        currentPrice = intradayData.points[intradayData.points.length - 1].price;
                        const prevClose = intradayData.prevClose || currentPrice;
                        stockPctChange = ((currentPrice - prevClose) / prevClose) * 100;
                    }
                    const derivativesList = generateDerivatives(activeFinalTicker, currentPrice, stockPctChange, isUS);
                    const derivTop = 225;
                    const tableTop = derivTop + 15;
                    const rowH = 26;
                    
                    derivativesList.forEach((d, idx) => {
                        const y = tableTop + rowH + idx * rowH;
                        if (mouseX >= padding.left && mouseX <= canvas.width - padding.right && mouseY >= y && mouseY <= y + rowH) {
                            shouldBePointer = true;
                        }
                    });
                }
            }
            
            if (viewMode === 'kline') {
                const kChartW = canvas.width - 80;
                const kAxisH = 25;
                const kUsableH = canvas.height - kAxisH;
                const kMainH = kUsableH * 0.52;
                if (isDragging) canvas.style.cursor = 'grabbing';
                else if (isRightDragging) canvas.style.cursor = 'ns-resize';
                else if (mouseX >= kChartW && mouseY <= kMainH) canvas.style.cursor = 'ns-resize';
                else if (mouseX >= 0 && mouseX < kChartW) canvas.style.cursor = 'grab';
                else canvas.style.cursor = 'default';
            } else {
                canvas.style.cursor = shouldBePointer ? 'pointer' : 'default';
            }
            
            drawCanvasChart(); 
            updateTopInfoPanel();
        });
        
        canvas.addEventListener('mouseleave', () => {
            mouseX = -1; mouseY = -1; 
            canvas.style.cursor = 'default';
            if(rawData.length > 0) currentHoveredCandle = rawData[rawData.length - 1]; 
            if(intradayData.points && intradayData.points.length > 0) currentHoveredPoint = intradayData.points[intradayData.points.length - 1];
            drawCanvasChart(); updateTopInfoPanel();
        });
        
        // ================================================================
        //  K 線互動系統（全新設計）
        //  滾輪        = 以滑鼠位置為中心做水平縮放
        //  左鍵拖移    = 左右平移
        //  右鍵拖移    = Y 軸縮放（往上拖放大 K 棒，往下拖縮小）
        //  雙擊        = 重置所有縮放與平移
        // ================================================================

        // 輔助：取得當前 K 線 viewport 參數
        function _klineViewport() {
            const chartW = canvas.width - 80;
            const totalDisplay = Math.min(rawData.length, displayCount);
            const maxOffset = Math.max(0, rawData.length - totalDisplay);
            const clampedOffset = Math.max(0, Math.min(dragOffset, maxOffset));
            const startIndex = Math.max(0, rawData.length - totalDisplay - clampedOffset);
            const candleWidth = chartW / totalDisplay;
            return { chartW, totalDisplay, maxOffset, clampedOffset, startIndex, candleWidth };
        }

        // ── 滾輪：以滑鼠位置為中心水平縮放 ──────────────────────────────
        canvas.addEventListener('wheel', (event) => {
            if (viewMode !== 'kline') return;
            event.preventDefault();

            const { chartW, totalDisplay, startIndex, candleWidth } = _klineViewport();

            // 找出滑鼠目前懸停在第幾根 K 棒
            const localX = Math.max(0, Math.min(mouseX, chartW));
            const hoveredBarIdx = startIndex + Math.floor(localX / candleWidth);

            // 調整 displayCount（放大＝看較少根，縮小＝看較多根）
            const factor = event.deltaY > 0 ? 1.12 : 0.89;
            displayCount = Math.max(15, Math.min(1000, Math.round(displayCount * factor)));

            // 讓 hoveredBarIdx 保持在同一水平位置
            const newTotal = Math.min(rawData.length, displayCount);
            const newCandleW = chartW / newTotal;
            const newStartIndex = Math.max(0, hoveredBarIdx - Math.floor(localX / newCandleW));
            const newMaxOffset = Math.max(0, rawData.length - newTotal);
            dragOffset = Math.max(0, Math.min(rawData.length - newTotal - newStartIndex, newMaxOffset));

            drawCanvasChart();
        }, { passive: false });

        // ── 雙擊：重置所有縮放與平移 ─────────────────────────────────────
        canvas.addEventListener('dblclick', () => {
            if (viewMode !== 'kline') return;
            yZoomMultiplier = 1.0;
            yPanOffset = 0;
            dragOffset = 0;
            const defaults = { '15m': 100, '30m': 100, '60m': 160, '4h': 160, 'D': 160, 'W': 156, 'M': 120 };
            displayCount = defaults[currentPeriod] || 80;
            drawCanvasChart();
        });

        // ── 滑鼠按下 / 抬起 ──────────────────────────────────────────────
        let isRightDragging = false;
        let rightDragStartY = 0;
        let rightDragStartZoom = 1.0;

        canvas.addEventListener('mousedown', (event) => {
            if (viewMode !== 'kline') return;

            const rect = canvas.getBoundingClientRect();
            const localX = event.clientX - rect.left;
            const localY = event.clientY - rect.top;
            const chartW = canvas.width - 80;
            const axisH = 25;
            const usableH = canvas.height - axisH;
            const mainH = usableH * 0.62;
            const isOnPriceAxis = localX >= chartW && localY <= mainH;

            if (event.button === 0 && isOnPriceAxis) {
                isRightDragging = true;
                rightDragStartY = event.clientY;
                rightDragStartZoom = yZoomMultiplier;
                canvas.style.cursor = 'ns-resize';
                event.preventDefault();
            } else if (event.button === 0 && localX < chartW) {
                isDragging = true;
                dragStartX = event.clientX;
                dragStartY = event.clientY;
                dragStartOffset = dragOffset;
                dragStartYPanOffset = yPanOffset;
                canvas.style.cursor = 'grabbing';
                event.preventDefault();
            } else if (event.button === 2) {
                isRightDragging = true;
                rightDragStartY = event.clientY;
                rightDragStartZoom = yZoomMultiplier;
                canvas.style.cursor = 'ns-resize';
                event.preventDefault();
            }
        });

        // 阻止右鍵選單（在 K 線模式下用右鍵做 Y 軸縮放）
        canvas.addEventListener('contextmenu', (event) => {
            if (viewMode === 'kline') event.preventDefault();
        });

        window.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                if (viewMode === 'kline') canvas.style.cursor = 'crosshair';
            }
            if (isRightDragging) {
                isRightDragging = false;
                if (viewMode === 'kline') canvas.style.cursor = 'crosshair';
            }
        });

        window.addEventListener('mousemove', (event) => {
            if (viewMode !== 'kline') return;

            if (isDragging) {
                // 左鍵：水平平移
                const chartW = canvas.width - 80;
                const candleWidth = chartW / Math.min(rawData.length, displayCount);
                const deltaX = event.clientX - dragStartX;
                const deltaY = event.clientY - dragStartY;
                const deltaCandlesRaw = -deltaX / candleWidth;
                const maxOffset = Math.max(0, rawData.length - Math.min(rawData.length, displayCount));
                dragOffset = Math.max(0, Math.min(Math.round(dragStartOffset + deltaCandlesRaw), maxOffset));

                const axisH = 25;
                const usableH = canvas.height - axisH;
                const mainH = usableH * 0.62;
                const totalDisplay = Math.min(rawData.length, displayCount);
                const startIndex = Math.max(0, rawData.length - totalDisplay - dragOffset);
                const visibleData = rawData.slice(startIndex, startIndex + totalDisplay);
                const prices = [];
                visibleData.forEach(d => {
                    prices.push(d.high, d.low);
                    if (d.ma5) prices.push(d.ma5);
                    if (d.ma20) prices.push(d.ma20);
                    if (d.ma60) prices.push(d.ma60);
                });
                const maxPrice = Math.max(...prices);
                const minPrice = Math.min(...prices);
                const adjustedRange = Math.max(0.0001, (maxPrice - minPrice) * Math.max(0.05, yZoomMultiplier) * 1.1);
                yPanOffset = dragStartYPanOffset + (deltaY / mainH) * adjustedRange;
                drawCanvasChart();
            }

            if (isRightDragging) {
                // 右鍵：Y 軸縮放
                // 往上拖（deltaY < 0）→ multiplier 減小 → 區間縮小 → K 棒變高（放大）
                // 往下拖（deltaY > 0）→ multiplier 增大 → 區間放大 → K 棒變矮（縮小）
                const deltaY = event.clientY - rightDragStartY;
                const scaleFactor = Math.pow(2, deltaY / 150);
                yZoomMultiplier = Math.max(0.05, Math.min(4.0, rightDragStartZoom * scaleFactor));
                drawCanvasChart();
            }
        });

        // ── 切換圖表模式時重置狀態 ───────────────────────────────────────
        const _origSwitchViewMode = switchViewMode;
        switchViewMode = function(mode) {
            _origSwitchViewMode(mode);
            isDragging = false;
            isRightDragging = false;
            if (mode !== 'kline') {
                dragOffset = 0;
                canvas.style.cursor = 'default';
            } else {
                canvas.style.cursor = 'crosshair';
            }
        };

        window.addEventListener('resize', drawCanvasChart);
        window.onload = () => { 
            renderHistoryList(); 
            updateWatchlistPrices(); 
            updateChart(true); 
        };
    </script>
</body>
