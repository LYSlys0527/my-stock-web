<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Trading Terminal | Live</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1c1d22;
            color: #e1e2e6;
            font-family: sans-serif;
        }
        /* 🎯 頂端品牌列：取代舊標題 */
        .brand-header {
            margin-bottom: 15px;
        }
        .main-title {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #fff;
        }
        .sub-title {
            font-size: 11px;
            color: #70737d;
            display: block;
            margin-top: 2px;
        }

        .control-panel {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        input, select {
            background: #2a2b30;
            border: 1px solid #44454a;
            color: #e1e2e6;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
        }
        input:focus {
            outline: 1px solid #2962ff;
        }
        
        .search-btn {
            background: #2962ff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border: none;
            padding: 9px 15px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .search-btn:hover { background: #1e4bd6; }
        
        .btn-group { display: flex; gap: 2px; margin-left: 10px; }
        .btn-group button { background: #2a2b30; border: 1px solid #44454a; color: #e1e2e6; border-radius: 0; padding: 10px 12px; cursor: pointer; font-size: 14px;}
        .btn-group button:first-child { border-radius: 4px 0 0 4px; }
        .btn-group button:last-child { border-radius: 0 4px 4px 0; }
        .btn-group button.active { background: #ff4a4a; border-color: #ff4a4a; font-weight: bold; }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #141518;
            padding: 12px 20px;
            border: 1px solid #2d2e33;
            border-bottom: none;
            border-radius: 4px 4px 0 0;
        }
        .info-item { font-weight: bold; }
        .company-text { color: #2962ff; font-size: 15px; }

        .price-display-block {
            font-size: 28px; 
            font-weight: bold; 
            font-family: monospace;
            display: flex;
            align-items: baseline;
            gap: 12px;
        }
        .change-text {
            font-size: 16px;
            font-weight: bold;
        }

        .main-content {
            display: flex;
            gap: 15px;
            width: 100%;
        }
        .canvas-container {
            flex: 1;
            background-color: #141518;
            border: 1px solid #2d2e33;
            border-radius: 0 0 0 4px;
        }
        canvas {
            display: block;
            cursor: crosshair;
        }

        .sidebar {
            width: 220px;
            background-color: #141518;
            border: 1px solid #2d2e33;
            border-radius: 0 0 4px 0;
            padding: 15px;
            box-sizing: border-box;
        }
        .sidebar h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 15px;
            color: #70737d;
            border-bottom: 1px solid #2d2e33;
            padding-bottom: 8px;
        }
        .history-list { list-style: none; padding: 0; margin: 0; }
        .history-item {
            padding: 10px; background: #1c1d22; border: 1px solid #2d2e33;
            margin-bottom: 8px; border-radius: 4px; cursor: pointer;
            text-align: center; font-weight: bold; transition: all 0.2s;
            font-size: 13px;
        }
        .history-item:hover { background: #2962ff; border-color: #2962ff; color: #fff; }
        .no-history { color: #5d606b; font-size: 13px; text-align: center; margin-top: 20px; font-style: italic; }
    </style>
</head>
<body>

    <div class="brand-header">
        <span class="main-title">MARKET TERMINAL</span>
        <span class="sub-title">Real-time Analytics Subsystem</span>
    </div>
    
    <div class="control-panel">
        <input type="text" id="symbol" value="AAPL" placeholder="輸入股票代碼 (如: 2330, NVDA)" style="width: 280px;">
        <button class="search-btn" onclick="updateChart(true)" title="搜尋股票">🔍</button>

        <div class="btn-group">
            <button id="btn-15m" onclick="changePeriod('15m')">15分</button>
            <button id="btn-30m" onclick="changePeriod('30m')">30分</button>
            <button id="btn-60m" onclick="changePeriod('60m')">60分</button>
            <button id="btn-4h" onclick="changePeriod('4h')">4時</button>
            <button id="btn-D" class="active" onclick="changePeriod('D')">日</button>
            <button id="btn-W" onclick="changePeriod('W')">週</button>
            <button id="btn-M" onclick="changePeriod('M')">月</button>
        </div>
    </div>

    <div class="info-panel" id="infoPanel">
        <div style="display: flex; gap: 30px; align-items: center;">
            <div class="info-item company-text" style="font-size: 18px; color: #fff;"><span id="info-company">載入中...</span></div>
            
            <div class="price-display-block">
                <span id="info-price">--.--</span>
                <span id="info-change" class="change-text">--.-- (--%)</span>
            </div>
        </div>
        
        <div style="display: flex; gap: 20px; align-items: center; font-size: 13px; color: #70737d;">
            <div>數據時間: <span id="info-date" style="color: #e1e2e6;">--</span></div>
            <div id="refresh-status" style="color: #26a69a; font-weight: bold; transition: opacity 0.15s;">盤中自動追蹤中</div>
        </div>
    </div>

    <div class="main-content">
        <div class="canvas-container">
            <canvas id="stockCanvas" width="800" height="680"></canvas>
        </div>
        
        <div class="sidebar">
            <h3>最近搜尋紀錄</h3>
            <ul class="history-list" id="historyList"></ul>
        </div>
    </div>

    <script>
        let rawData = [];
        let displayCount = 80;
        let currentPeriod = 'D';
        let mouseX = -1;
        let mouseY = -1; 
        let currentHoveredCandle = null; 
        
        let currentCompanyName = "";
        let currentTickerLabel = "";
        let activeFinalTicker = ""; 
        
        let priceRefreshInterval = null; 

        function changePeriod(p) {
            currentPeriod = p;
            ['15m', '30m', '60m', '4h', 'D', 'W', 'M'].forEach(per => { 
                document.getElementById(`btn-${per}`).classList.remove('active'); 
            });
            document.getElementById(`btn-${p}`).classList.add('active');
            
            if (p.includes('m') || p === '4h') displayCount = 100;
            if (p === 'D') displayCount = 80;
            if (p === 'W') displayCount = 52;
            if (p === 'M') displayCount = 36;
            
            updateChart(false);
        }

        function formatTickerForBackend(input) {
            let clean = input.trim().toUpperCase();
            clean = clean.replace('.TWO', '').replace('.TW', '');
            if (/^\d+/.test(clean)) {
                return clean + '.TW'; 
            }
            return clean;
        }

        function getCleanLogTicker(input) {
            return input.trim().toUpperCase().replace('.TWO', '').replace('.TW', '');
        }

        async function updateChart(isNewSearch = false) {
            const inputVal = document.getElementById('symbol').value;
            if (!inputVal.trim()) return;

            if (isNewSearch || !activeFinalTicker) {
                activeFinalTicker = formatTickerForBackend(inputVal);
            }

            try {
                const currentOrigin = window.location.origin;
                let response = await fetch(`${currentOrigin}/api/stock?ticker=${activeFinalTicker}&type=${currentPeriod}`);
                let resData = await response.json();
                
                if ((response.status !== 200 || resData.error) && activeFinalTicker.includes('.TW')) {
                    console.log(`⚠️偵測到 ${activeFinalTicker} 撈取失敗，自動重試切換為上櫃市場格式 (.TWO)...`);
                    activeFinalTicker = activeFinalTicker.replace('.TW', '.TWO'); 
                    response = await fetch(`${currentOrigin}/api/stock?ticker=${activeFinalTicker}&type=${currentPeriod}`);
                    resData = await response.json();
                }

                if (resData.error) {
                    alert("資料載入失敗，此代碼可能不存在！");
                    return;
                }

                renderDataPayload(resData, inputVal, isNewSearch);
            } catch (err) {
                console.error("前端抓取失敗:", err);
            }
        }

        function renderDataPayload(resData, inputVal, isNewSearch) {
            currentCompanyName = resData.companyName;
            currentTickerLabel = resData.tickerLabel;
            rawData = resData.candles;

            document.getElementById('info-company').innerText = `${currentCompanyName} (${currentTickerLabel})`;

            calculateMA(5, 'ma5');
            calculateMA(20, 'ma20');
            calculateMA(60, 'ma60');
            calculateMACD(); 

            currentHoveredCandle = rawData[rawData.length - 1];
            updateTopInfoPanel();
            drawCanvasChart();

            if (isNewSearch) { 
                let isTW = currentCompanyName.includes('[市]') || currentCompanyName.includes('[櫃]') || currentCompanyName.includes('[興]');
                saveToHistory(getCleanLogTicker(inputVal), isTW); 
                document.getElementById('symbol').value = getCleanLogTicker(inputVal);
            }
            initAutoRefresh();
        }

        function initAutoRefresh() {
            if (priceRefreshInterval) { clearInterval(priceRefreshInterval); }

            priceRefreshInterval = setInterval(async () => {
                if (!activeFinalTicker) return;

                const statusEl = document.getElementById('refresh-status');
                statusEl.style.opacity = '0.3';
                setTimeout(() => { statusEl.style.opacity = '1'; }, 150);

                try {
                    const currentOrigin = window.location.origin;
                    const response = await fetch(`${currentOrigin}/api/stock?ticker=${activeFinalTicker}&type=${currentPeriod}`);
                    const resData = await response.json();
                    
                    if (resData && Array.isArray(resData.candles) && resData.candles.length > 0) {
                        rawData = resData.candles;
                        calculateMA(5, 'ma5');
                        calculateMA(20, 'ma20');
                        calculateMA(60, 'ma60');
                        calculateMACD(); 

                        updateTopInfoPanel();
                        drawCanvasChart();
                    }
                } catch (e) { console.log("自動刷新延遲...", e); }
            }, 2000); 
        }

        function calculateMACD() {
            let ema12 = 0, ema26 = 0, dif = 0, dem9 = 0;
            const k12 = 2 / 13, k26 = 2 / 27, k9 = 2 / 10;
            for (let i = 0; i < rawData.length; i++) {
                let close = rawData[i].close;
                if (i === 0) { ema12 = close; ema26 = close; } 
                else {
                    ema12 = close * k12 + ema12 * (1 - k12);
                    ema26 = close * k26 + ema26 * (1 - k26);
                }
                dif = ema12 - ema26;
                if (i === 0) { dem9 = dif; } 
                else { dem9 = dif * k9 + dem9 * (1 - k9); }
                rawData[i].macd_dif = dif;  
                rawData[i].macd_dem = dem9; 
                rawData[i].macd_osc = (dif - dem9) * 2;  
            }
        }

        function calculateMA(period, keyName) {
            for (let i = 0; i < rawData.length; i++) {
                if (i < period - 1) { rawData[i][keyName] = null; continue; }
                let sum = 0;
                for (let j = 0; j < period; j++) { sum += rawData[i - j].close; }
                rawData[i][keyName] = sum / period;
            }
        }

        function updateTopInfoPanel() {
            if (!rawData || rawData.length === 0) return;
            
            // 如果十字線正指著某根 K 線，頂端資訊同步顯示該 K 線時間，否則顯示最後一根
            const targetCandle = currentHoveredCandle || rawData[rawData.length - 1];
            const todayCandle = rawData[rawData.length - 1];
            const prevCandle = rawData.length > 1 ? rawData[rawData.length - 2] : todayCandle;
            const basePrice = prevCandle.close; 
            
            const currentPrice = todayCandle.close;
            const priceChange = currentPrice - basePrice;
            const percentChange = basePrice !== 0 ? (priceChange / basePrice) * 100 : 0;

            document.getElementById('info-date').innerText = targetCandle.time;
            
            const priceEl = document.getElementById('info-price');
            priceEl.innerText = currentPrice.toFixed(2);
            
            const changeEl = document.getElementById('info-change');
            const sign = priceChange > 0 ? '+' : '';
            changeEl.innerText = `${sign}${priceChange.toFixed(2)} (${sign}${percentChange.toFixed(2)}%)`;

            if (priceChange > 0) {
                priceEl.style.color = '#ff4a4a';
                changeEl.style.color = '#ff4a4a';
            } else if (priceChange < 0) {
                priceEl.style.color = '#26a69a';
                changeEl.style.color = '#26a69a';
            } else {
                priceEl.style.color = '#e1e2e6';
                changeEl.style.color = '#e1e2e6';
            }
        }

        // 🎯 輔助函式：用來將原始 Volume 轉換為台股「張數」或美股「股數」字串
        function formatVolumeUnit(vol, isTW) {
            if (!vol) return '0';
            if (isTW) {
                let sheets = (vol / 1000).toFixed(2);
                return `${Number(sheets).toLocaleString()} 張 (${vol.toLocaleString()} 股)`;
            }
            return `${vol.toLocaleString()} 股`;
        }

        function drawCanvasChart() {
            const canvas = document.getElementById('stockCanvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = canvas.parentElement.clientWidth;
            const width = canvas.width;
            const height = canvas.height;
            const rightPadding = 80;
            const chartW = width - rightPadding;

            const mainH = height * 0.50; 
            const volH = height * 0.16;  
            const macdH = height * 0.18; 
            
            const volTop = mainH + height * 0.04; 
            const macdTop = volTop + volH + height * 0.04;

            ctx.fillStyle = '#141518';
            ctx.fillRect(0, 0, width, height);

            if (rawData.length === 0) return;

            ctx.save();
            ctx.fillStyle = 'rgba(255, 255, 255, 0.025)'; 
            ctx.font = 'bold 36px sans-serif';
            ctx.fillText(`${currentTickerLabel}`, 20, mainH - 60);
            ctx.font = 'bold 20px sans-serif';
            ctx.fillText(`${currentCompanyName}`, 20, mainH - 30);
            ctx.restore();

            const totalDisplay = Math.min(rawData.length, displayCount);
            const startIndex = rawData.length - totalDisplay;
            const candleWidth = chartW / totalDisplay;
            let visibleData = rawData.slice(startIndex);

            // 判斷當前標的是否為台股
            const isTWStock = currentCompanyName.includes('[市]') || currentCompanyName.includes('[櫃]') || currentCompanyName.includes('[興]');

            let prices = [];
            visibleData.forEach(d => {
                prices.push(d.high, d.low);
                if(d.ma5) prices.push(d.ma5);
                if(d.ma20) prices.push(d.ma20);
                if(d.ma60) prices.push(d.ma60);
            });
            let maxPrice = Math.max(...prices);
            let minPrice = Math.min(...prices);
            let priceRange = maxPrice - minPrice;
            maxPrice += priceRange * 0.05; minPrice -= priceRange * 0.05;
            let adjustedRange = maxPrice - minPrice;

            const getPriceY = (price) => mainH - ((price - minPrice) / adjustedRange) * mainH;

            ctx.strokeStyle = '#232429'; ctx.lineWidth = 1;
            for (let i = 1; i < 4; i++) {
                let y = (mainH / 4) * i;
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(chartW, y); ctx.stroke();
                ctx.fillStyle = '#70737d'; ctx.font = '11px sans-serif';
                let priceLabel = maxPrice - (adjustedRange / 4) * i;
                ctx.fillText(priceLabel.toFixed(2), chartW + 8, y + 4);
            }

            const drawMALine = (keyName, color) => {
                ctx.strokeStyle = color; ctx.lineWidth = 1.2; ctx.beginPath();
                let started = false;
                for (let i = 0; i < totalDisplay; i++) {
                    const data = rawData[startIndex + i];
                    if (!data[keyName]) continue;
                    let cx = i * candleWidth + candleWidth/2;
                    if (!started) { ctx.moveTo(cx, getPriceY(data[keyName])); started = true; } 
                    else { ctx.lineTo(cx, getPriceY(data[keyName])); }
                }
                ctx.stroke();
            };
            drawMALine('ma5', '#ffb74d'); drawMALine('ma20', '#ba68c8'); drawMALine('ma60', '#4fc3f7');

            let maxVol = Math.max(...visibleData.map(d => d.volume || 0));
            ctx.strokeStyle = '#232429';
            ctx.beginPath(); ctx.moveTo(0, volTop); ctx.lineTo(chartW, volTop); ctx.stroke();
            ctx.fillStyle = '#70737d'; 
            
            // 右側量能刻度也做相應換算提示
            let topVolLabel = isTWStock ? `${Math.round(maxVol/1000)}張` : maxVol.toLocaleString();
            ctx.fillText(topVolLabel, chartW + 8, volTop + 12);

            let macdValues = [];
            visibleData.forEach(d => {
                if(d.macd_osc) macdValues.push(Math.abs(d.macd_osc));
                if(d.macd_dif) macdValues.push(Math.abs(d.macd_dif));
                if(d.macd_dem) macdValues.push(Math.abs(d.macd_dem));
            });
            let maxMacd = Math.max(...macdValues) || 1;
            maxMacd *= 1.05;

            ctx.strokeStyle = '#38393e';
            ctx.beginPath(); ctx.moveTo(0, macdTop + macdH/2); ctx.lineTo(chartW, macdTop + macdH/2); ctx.stroke();
            ctx.fillStyle = '#70737d';
            ctx.fillText(maxMacd.toFixed(2), chartW + 8, macdTop + 12);
            ctx.fillText((-maxMacd).toFixed(2), chartW + 8, macdTop + macdH);

            const getMacdY = (val) => (macdTop + macdH/2) - (val / maxMacd) * (macdH / 2);

            let hoveredCandleIndex = -1;
            let finalLineX = -1;

            for (let i = 0; i < totalDisplay; i++) {
                const data = rawData[startIndex + i];
                const x = i * candleWidth + (candleWidth * 0.1);
                const w = candleWidth * 0.8;
                const isUp = data.close >= data.open;
                const color = isUp ? '#ff4a4a' : '#26a69a';

                ctx.strokeStyle = color; ctx.fillStyle = color;

                const yOpen = getPriceY(data.open); const yClose = getPriceY(data.close);
                ctx.beginPath(); ctx.moveTo(x + w / 2, getPriceY(data.high)); ctx.lineTo(x + w / 2, getPriceY(data.low)); ctx.stroke();
                ctx.fillRect(x, Math.min(yOpen, yClose), w, Math.abs(yOpen - yClose) || 2);

                const vH = ((data.volume || 0) / maxVol) * volH;
                ctx.fillStyle = isUp ? 'rgba(255, 74, 74, 0.45)' : 'rgba(38, 166, 154, 0.45)';
                ctx.fillRect(x, volTop + volH - vH, w, vH);

                const yZero = macdTop + macdH/2;
                const yOsc = getMacdY(data.macd_osc);
                ctx.fillStyle = data.macd_osc >= 0 ? 'rgba(255, 74, 74, 0.75)' : 'rgba(38, 166, 154, 0.75)';
                ctx.fillRect(x, Math.min(yZero, yOsc), w, Math.abs(yZero - yOsc) || 1);

                if (mouseX >= i * candleWidth && mouseX < (i + 1) * candleWidth) {
                    hoveredCandleIndex = startIndex + i;
                    finalLineX = x + w / 2;
                }
            }

            ctx.strokeStyle = '#ffeb3b'; ctx.lineWidth = 1.5; ctx.beginPath();
            let difStarted = false;
            for (let i = 0; i < totalDisplay; i++) {
                const data = rawData[startIndex + i]; if (data.macd_dif === undefined) continue;
                if (!difStarted) { ctx.moveTo(i * candleWidth + candleWidth/2, getMacdY(data.macd_dif)); difStarted = true; } 
                else { ctx.lineTo(i * candleWidth + candleWidth/2, getMacdY(data.macd_dif)); }
            }
            ctx.stroke();

            ctx.strokeStyle = '#00e5ff'; ctx.lineWidth = 1.5; ctx.beginPath();
            let deaStarted = false;
            for (let i = 0; i < totalDisplay; i++) {
                const data = rawData[startIndex + i]; if (data.macd_dem === undefined) continue;
                if (!deaStarted) { ctx.moveTo(i * candleWidth + candleWidth/2, getMacdY(data.macd_dem)); deaStarted = true; } 
                else { ctx.lineTo(i * candleWidth + candleWidth/2, getMacdY(data.macd_dem)); }
            }
            ctx.stroke();

            if (hoveredCandleIndex !== -1) {
                currentHoveredCandle = rawData[hoveredCandleIndex];
            }

            if (mouseX >= 0 && mouseX <= chartW && mouseY >= 0 && mouseY <= height) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.35)';
                ctx.lineWidth = 1;
                ctx.setLineDash([4, 4]);

                if (finalLineX !== -1) {
                    ctx.beginPath(); ctx.moveTo(finalLineX, 0); ctx.lineTo(finalLineX, height); ctx.stroke();
                }

                ctx.beginPath(); ctx.moveTo(0, mouseY); ctx.lineTo(chartW, mouseY); ctx.stroke();
                ctx.setLineDash([]);

                if (mouseY <= mainH) {
                    let hoverPrice = maxPrice - (mouseY / mainH) * adjustedRange;
                    ctx.fillStyle = '#2962ff';
                    ctx.fillRect(chartW + 2, mouseY - 9, rightPadding - 4, 18);
                    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 11px sans-serif';
                    ctx.fillText(hoverPrice.toFixed(2), chartW + 8, mouseY + 4);
                } else if (mouseY >= volTop && mouseY <= volTop + volH) {
                    let hoverVol = Math.round(((volTop + volH - mouseY) / volH) * maxVol);
                    if (hoverVol >= 0) {
                        ctx.fillStyle = '#44454a';
                        ctx.fillRect(chartW + 2, mouseY - 9, rightPadding - 4, 18);
                        ctx.fillStyle = '#ffffff'; ctx.font = '10px sans-serif';
                        let hoverVolStr = isTWStock ? `${(hoverVol/1000).toFixed(1)}張` : hoverVol.toLocaleString();
                        ctx.fillText(hoverVolStr, chartW + 5, mouseY + 4);
                    }
                } else if (mouseY >= macdTop && mouseY <= macdTop + macdH) {
                    let hoverMacd = ((macdTop + macdH/2 - mouseY) / (macdH / 2)) * maxMacd;
                    ctx.fillStyle = '#ba68c8';
                    ctx.fillRect(chartW + 2, mouseY - 9, rightPadding - 4, 18);
                    ctx.fillStyle = '#ffffff'; ctx.font = '11px sans-serif';
                    ctx.fillText(hoverMacd.toFixed(3), chartW + 8, mouseY + 4);
                }
            }

            // 🎯 2 & 3. 繪製左上角狀態數值（加上 K 線年月日與自適應張數/股數單位判定）
            if (currentHoveredCandle) {
                const hData = currentHoveredCandle;
                ctx.font = '12px sans-serif';
                
                let kColor = hData.close >= hData.open ? '#ff4a4a' : '#26a69a';
                
                // 數據最前方追加特定 K 線的完整時間
                ctx.fillStyle = '#ffeb3b'; ctx.fillText(`📅 ${hData.time}`, 10, 20);

                let startX = 130; // 挪動後續 O,H,L,C 的起點坐標，避免與黃色日期重疊
                ctx.fillStyle = '#e1e2e6'; ctx.fillText('開:', startX, 20);
                ctx.fillStyle = kColor;   ctx.fillText(hData.open.toFixed(2), startX + 20, 20);
                ctx.fillStyle = '#e1e2e6'; ctx.fillText('高:', startX + 75, 20);
                ctx.fillStyle = kColor;   ctx.fillText(hData.high.toFixed(2), startX + 95, 20);
                ctx.fillStyle = '#e1e2e6'; ctx.fillText('低:', startX + 150, 20);
                ctx.fillStyle = kColor;   ctx.fillText(hData.low.toFixed(2), startX + 170, 20);
                ctx.fillStyle = '#e1e2e6'; ctx.fillText('收:', startX + 225, 20);
                ctx.fillStyle = kColor;   ctx.fillText(hData.close.toFixed(2), startX + 245, 20);
                
                ctx.fillStyle = '#ffb74d'; ctx.fillText(`MA5: ${hData.ma5 ? hData.ma5.toFixed(2) : '--'}`, startX + 310, 20);
                ctx.fillStyle = '#ba68c8'; ctx.fillText(`MA20: ${hData.ma20 ? hData.ma20.toFixed(2) : '--'}`, startX + 400, 20);
                ctx.fillStyle = '#4fc3f7'; ctx.fillText(`MA60: ${hData.ma60 ? hData.ma60.toFixed(2) : '--'}`, startX + 495, 20);

                // 成交量副圖標題換算
                ctx.fillStyle = '#a1a4b0';
                ctx.fillText(`成交量: ${formatVolumeUnit(hData.volume, isTWStock)}`, 10, volTop - 6);

                ctx.fillStyle = '#ffeb3b'; ctx.fillText(`DIF(快): ${hData.macd_dif ? hData.macd_dif.toFixed(3) : '--'}`, 10, macdTop - 6);
                ctx.fillStyle = '#00e5ff'; ctx.fillText(`DEA(慢): ${hData.macd_dem ? hData.macd_dem.toFixed(3) : '--'}`, 130, macdTop - 6);
                
                let oscColor = hData.macd_osc >= 0 ? '#ff4a4a' : '#26a69a';
                ctx.fillStyle = '#e1e2e6'; ctx.fillText(`OSC(柱): `, 250, macdTop - 6);
                ctx.fillStyle = oscColor; ctx.fillText(`${hData.macd_osc ? hData.macd_osc.toFixed(3) : '--'}`, 300, macdTop - 6);
            }
        }

        function saveToHistory(symbol, isTW) {
            let history = JSON.parse(localStorage.getItem('stock_history')) || [];
            history = history.filter(item => item.symbol !== symbol);
            history.unshift({ symbol: symbol, isTW: isTW });
            if (history.length > 5) history = history.slice(0, 5);
            localStorage.setItem('stock_history', JSON.stringify(history));
            renderHistoryList();
        }

        function renderHistoryList() {
            const listEl = document.getElementById('historyList');
            let history = JSON.parse(localStorage.getItem('stock_history')) || [];
            if (history.length === 0) { listEl.innerHTML = '<div class="no-history">無搜尋紀錄</div>'; return; }
            listEl.innerHTML = '';
            history.forEach(item => {
                const li = document.createElement('li'); li.className = 'history-item';
                const marketText = item.isTW ? '台股' : '美股';
                li.innerText = `${item.symbol} (${marketText})`;
                li.onclick = () => {
                    document.getElementById('symbol').value = item.symbol;
                    updateChart(true);
                };
                listEl.appendChild(li);
            });
        }

        document.getElementById('symbol').addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                updateChart(true);
            }
        });

        const canvas = document.getElementById('stockCanvas');
        canvas.addEventListener('mousemove', (event) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = event.clientX - rect.left;
            mouseY = event.clientY - rect.top; 
            drawCanvasChart();
            updateTopInfoPanel(); // 十字線滑動時，同步更新上方 info panel 的日期
        });
        canvas.addEventListener('mouseleave', () => {
            mouseX = -1; mouseY = -1; 
            currentHoveredCandle = rawData[rawData.length - 1]; 
            drawCanvasChart();
            updateTopInfoPanel();
        });
        canvas.addEventListener('wheel', (event) => {
            event.preventDefault();
            if (event.deltaY > 0) { displayCount = Math.min(displayCount + 5, 300); } 
            else { displayCount = Math.max(displayCount - 5, 15); }
            drawCanvasChart(); 
        }, { passive: false });

        window.addEventListener('resize', drawCanvasChart);
        window.onload = () => { renderHistoryList(); updateChart(true); };
    </script>
</body>
</html>
