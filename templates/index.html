<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>專業級自製看盤軟體 | 免費台股美股即時K線圖、MACD指標、均線觀測站</title>
    
    <meta name="description" content="最流暢的網頁版自製看盤系統。支援台股中文、美股英文公司名稱自動智慧辨識，內建雙向十字虛線連動、成交量、MACD 技術指標與即時均線查詢。">
    <meta name="keywords" content="看盤軟體, 台股K線, 美股K線, MACD, 均線, 自製看盤系統">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1c1d22;
            color: #e1e2e6;
            font-family: sans-serif;
        }
        .control-panel {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        input, button, select {
            background: #2a2b30;
            border: 1px solid #44454a;
            color: #e1e2e6;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
        }
        button {
            background: #2962ff;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        button:hover { background: #1e4bd6; }
        
        .btn-group { display: flex; gap: 2px; margin-left: 10px; }
        .btn-group button { background: #2a2b30; border: 1px solid #44454a; border-radius: 0; }
        .btn-group button:first-child { border-radius: 4px 0 0 4px; }
        .btn-group button:last-child { border-radius: 0 4px 4px 0; }
        .btn-group button.active { background: #ff4a4a; border-color: #ff4a4a; }

        .info-panel {
            display: flex;
            gap: 25px;
            background: #141518;
            padding: 10px 15px;
            border: 1px solid #2d2e33;
            border-bottom: none;
            font-size: 14px;
            border-radius: 4px 4px 0 0;
        }
        .info-item { font-weight: bold; }
        .up-text { color: #ff4a4a; }
        .down-text { color: #26a69a; }
        .company-text { color: #2962ff; font-size: 15px; }

        .main-content {
            display: flex;
            gap: 15px;
            width: 100%;
        }
        .canvas-container {
            flex: 1;
            background-color: #141518;
            border: 1px solid #2d2e33;
            border-radius: 0 0 0 4px;
        }
        canvas {
            display: block;
            cursor: crosshair;
        }

        .sidebar {
            width: 220px;
            background-color: #141518;
            border: 1px solid #2d2e33;
            border-radius: 0 0 4px 0;
            padding: 15px;
            box-sizing: border-box;
        }
        .sidebar h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 15px;
            color: #70737d;
            border-bottom: 1px solid #2d2e33;
            padding-bottom: 8px;
        }
        .history-list { list-style: none; padding: 0; margin: 0; }
        .history-item {
            padding: 10px; background: #1c1d22; border: 1px solid #2d2e33;
            margin-bottom: 8px; border-radius: 4px; cursor: pointer;
            text-align: center; font-weight: bold; transition: all 0.2s;
        }
        .history-item:hover { background: #2962ff; border-color: #2962ff; color: #fff; }
        .no-history { color: #5d606b; font-size: 13px; text-align: center; margin-top: 20px; font-style: italic; }
    </style>
</head>
<body>

    <h2>🚀 專業級自製看盤軟體 (企業名稱精準對應版)</h2>
    
    <div class="control-panel">
        <select id="market">
            <option value="TW">台股</option>
            <option value="US" selected>美股</option>
        </select>
        <input type="text" id="symbol" value="AAPL" placeholder="輸入代碼">
        <button onclick="updateChart(true)">看盤</button>

        <div class="btn-group">
            <button id="btn-D" class="active" onclick="changePeriod('D')">日</button>
            <button id="btn-W" onclick="changePeriod('W')">週</button>
            <button id="btn-M" onclick="changePeriod('M')">月</button>
        </div>
    </div>

    <div class="info-panel" id="infoPanel">
        <div class="info-item company-text">🏢 <span id="info-company">載入中...</span></div>
        <div class="info-item">🔍 當前觀測日期: <span id="info-date">--</span></div>
        <div class="info-item">終場收盤價: <span id="info-close">--</span></div>
    </div>

    <div class="main-content">
        <div class="canvas-container">
            <canvas id="stockCanvas" width="800" height="680"></canvas>
        </div>
        
        <div class="sidebar">
            <h3>⏱️ 最近搜尋紀錄</h3>
            <ul class="history-list" id="historyList"></ul>
        </div>
    </div>

    <script>
        let rawData = [];
        let displayCount = 80;
        let currentPeriod = 'D';
        let mouseX = -1;
        let mouseY = -1; 
        let currentHoveredCandle = null; 
        
        let currentCompanyName = "";
        let currentTickerLabel = "";

        // 精心準備的台美股核心對照表，防止 API 被跨網域阻擋時能 100% 精準顯示名稱
        const localStockDatabase = {
            // 台股中文對照
            "2330.TW": "台積電", "2317.TW": "鴻海", "2454.TW": "聯發科", "2308.TW": "台達電",
            "2382.TW": "廣達", "2303.TW": "聯電", "2881.TW": "富邦金", "2882.TW": "國泰金",
            "2891.TW": "中信金", "2603.TW": "長榮", "2609.TW": "陽明", "2615.TW": "萬海",
            "2610.TW": "華航", "2618.TW": "長榮航", "2324.TW": "仁寶", "2357.TW": "華碩",
            "3231.TW": "緯創", "2356.TW": "英業達", "2886.TW": "兆豐金", "5880.TW": "合庫金",
            "0050.TW": "元大台灣50", "0056.TW": "元大高股息", "00878.TW": "國泰永續高股息",
            
            // 美股英文對照
            "AAPL": "Apple Inc.", "TSLA": "Tesla, Inc.", "NVDA": "NVIDIA Corporation",
            "MSFT": "Microsoft Corp.", "AMZN": "Amazon.com, Inc.", "GOOGL": "Alphabet Inc.",
            "META": "Meta Platforms", "NFLX": "Netflix, Inc.", "AMD": "Advanced Micro Devices",
            "INTC": "Intel Corporation", "QQQ": "Invesco QQQ Trust", "SPY": "SPDR S&P 500 ETF"
        };

        function changePeriod(p) {
            currentPeriod = p;
            ['D', 'W', 'M'].forEach(per => { document.getElementById(`btn-${per}`).classList.remove('active'); });
            document.getElementById(`btn-${p}`).classList.add('active');
            if (p === 'D') displayCount = 80;
            if (p === 'W') displayCount = 52;
            if (p === 'M') displayCount = 36;
            updateChart(false);
        }

        // 精準多重管道查詢公司名
        async function fetchCompanyName(ticker, market) {
            currentTickerLabel = ticker.replace('.TW', '');

            // 優先管道 1：檢查內建資料庫（速度最快且 100% 成功）
            if (localStockDatabase[ticker]) {
                currentCompanyName = localStockDatabase[ticker];
                return;
            }

            // 備用管道 2：使用開放、無 CORS 限制的通用查名服務
            try {
                const cleanTicker = market === 'TW' ? currentTickerLabel : ticker;
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://query1.finance.yahoo.com/v1/finance/search?q=' + ticker)}`);
                const wrapper = await res.json();
                const json = JSON.parse(wrapper.contents);
                
                if (json.quotes && json.quotes.length > 0) {
                    let name = json.quotes[0].shortname || json.quotes[0].longname;
                    if (name) {
                        currentCompanyName = name.replace('.TW', '');
                        return;
                    }
                }
            } catch (e) {
                console.log("異步查名輕微延遲，啟動兜底命名機制");
            }

            // 兜底管道 3：依市場類型自動格式化顯示
            currentCompanyName = market === 'TW' ? `台股 ${currentTickerLabel}` : `US Stock ${currentTickerLabel}`;
        }

        async function updateChart(isNewSearch = false) {
            const market = document.getElementById('market').value;
            let symbol = document.getElementById('symbol').value.trim().toUpperCase();
            if (!symbol) return;

            let displaySymbol = symbol;
            if (market === 'TW' && !symbol.includes('.')) {
                symbol += '.TW';
                displaySymbol = symbol; 
            }

            // 執行查名邏輯
            await fetchCompanyName(symbol, market);
            document.getElementById('info-company').innerText = `${currentCompanyName} (${currentTickerLabel})`;

            try {
                const currentOrigin = window.location.origin;
                const response = await fetch(`${currentOrigin}/api/stock?ticker=${symbol}&type=${currentPeriod}`);
                const data = await response.json();
                
                if (data.error || !Array.isArray(data) || data.length === 0) {
                    alert("資料載入失敗，請確認代碼！");
                    return;
                }

                rawData = data;
                calculateMA(5, 'ma5');
                calculateMA(20, 'ma20');
                calculateMA(60, 'ma60');
                calculateMACD(); 

                currentHoveredCandle = rawData[rawData.length - 1];
                updateTopInfoPanel(currentHoveredCandle);
                drawCanvasChart();

                if (isNewSearch) { saveToHistory(displaySymbol, market); }
            } catch (err) {
                console.error("前端抓取失敗:", err);
            }
        }

        function calculateMACD() {
            let ema12 = 0, ema26 = 0, dif = 0, dem9 = 0;
            const k12 = 2 / 13, k26 = 2 / 27, k9 = 2 / 10;
            for (let i = 0; i < rawData.length; i++) {
                let close = rawData[i].close;
                if (i === 0) { ema12 = close; ema26 = close; } 
                else {
                    ema12 = close * k12 + ema12 * (1 - k12);
                    ema26 = close * k26 + ema26 * (1 - k26);
                }
                dif = ema12 - ema26;
                if (i === 0) { dem9 = dif; } 
                else { dem9 = dif * k9 + dem9 * (1 - k9); }
                rawData[i].macd_dif = dif;  
                rawData[i].macd_dem = dem9; 
                rawData[i].macd_osc = (dif - dem9) * 2;  
            }
        }

        function calculateMA(period, keyName) {
            for (let i = 0; i < rawData.length; i++) {
                if (i < period - 1) { rawData[i][keyName] = null; continue; }
                let sum = 0;
                for (let j = 0; j < period; j++) { sum += rawData[i - j].close; }
                rawData[i][keyName] = sum / period;
            }
        }

        function updateTopInfoPanel(candle) {
            if (!candle) return;
            document.getElementById('info-date').innerText = candle.time;
            document.getElementById('info-close').innerText = candle.close.toFixed(2);
            document.getElementById('info-close').className = candle.close >= candle.open ? 'up-text' : 'down-text';
        }

        function drawCanvasChart() {
            const canvas = document.getElementById('stockCanvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = canvas.parentElement.clientWidth;
            const width = canvas.width;
            const height = canvas.height;
            const rightPadding = 80;
            const chartW = width - rightPadding;

            const mainH = height * 0.50; 
            const volH = height * 0.16;  
            const macdH = height * 0.18; 
            
            const volTop = mainH + height * 0.04; 
            const macdTop = volTop + volH + height * 0.04;

            ctx.fillStyle = '#141518';
            ctx.fillRect(0, 0, width, height);

            if (rawData.length === 0) return;

            // 浮水印大字畫布
            ctx.save();
            ctx.fillStyle = 'rgba(255, 255, 255, 0.025)'; 
            ctx.font = 'bold 36px sans-serif';
            ctx.fillText(`${currentTickerLabel}`, 20, mainH - 60);
            ctx.font = 'bold 20px sans-serif';
            ctx.fillText(`${currentCompanyName}`, 20, mainH - 30);
            ctx.restore();

            const totalDisplay = Math.min(rawData.length, displayCount);
            const startIndex = rawData.length - totalDisplay;
            const candleWidth = chartW / totalDisplay;
            let visibleData = rawData.slice(startIndex);

            let prices = [];
            visibleData.forEach(d => {
                prices.push(d.high, d.low);
                if(d.ma5) prices.push(d.ma5);
                if(d.ma20) prices.push(d.ma20);
                if(d.ma60) prices.push(d.ma60);
            });
            let maxPrice = Math.max(...prices);
            let minPrice = Math.min(...prices);
            let priceRange = maxPrice - minPrice;
            maxPrice += priceRange * 0.05; minPrice -= priceRange * 0.05;
            let adjustedRange = maxPrice - minPrice;

            const getPriceY = (price) => mainH - ((price - minPrice) / adjustedRange) * mainH;

            ctx.strokeStyle = '#232429'; ctx.lineWidth = 1;
            for (let i = 1; i < 4; i++) {
                let y = (mainH / 4) * i;
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(chartW, y); ctx.stroke();
                ctx.fillStyle = '#70737d'; ctx.font = '11px sans-serif';
                let priceLabel = maxPrice - (adjustedRange / 4) * i;
                ctx.fillText(priceLabel.toFixed(2), chartW + 8, y + 4);
            }

            const drawMALine = (keyName, color) => {
                ctx.strokeStyle = color; ctx.lineWidth = 1.2; ctx.beginPath();
                let started = false;
                for (let i = 0; i < totalDisplay; i++) {
                    const data = rawData[startIndex + i];
                    if (!data[keyName]) continue;
                    let cx = i * candleWidth + candleWidth/2;
                    if (!started) { ctx.moveTo(cx, getPriceY(data[keyName])); started = true; } 
                    else { ctx.lineTo(cx, getPriceY(data[keyName])); }
                }
                ctx.stroke();
            };
            drawMALine('ma5', '#ffb74d'); drawMALine('ma20', '#ba68c8'); drawMALine('ma60', '#4fc3f7');

            let maxVol = Math.max(...visibleData.map(d => d.volume || 0));
            ctx.strokeStyle = '#232429';
            ctx.beginPath(); ctx.moveTo(0, volTop); ctx.lineTo(chartW, volTop); ctx.stroke();
            ctx.fillStyle = '#70737d'; ctx.fillText(maxVol.toLocaleString(), chartW + 8, volTop + 12);

            let macdValues = [];
            visibleData.forEach(d => {
                if(d.macd_osc) macdValues.push(Math.abs(d.macd_osc));
                if(d.macd_dif) macdValues.push(Math.abs(d.macd_dif));
                if(d.macd_dem) macdValues.push(Math.abs(d.macd_dem));
            });
            let maxMacd = Math.max(...macdValues) || 1;
            maxMacd *= 1.05;

            ctx.strokeStyle = '#38393e';
            ctx.beginPath(); ctx.moveTo(0, macdTop + macdH/2); ctx.lineTo(chartW, macdTop + macdH/2); ctx.stroke();
            ctx.fillStyle = '#70737d';
            ctx.fillText(maxMacd.toFixed(2), chartW + 8, macdTop + 12);
            ctx.fillText((-maxMacd).toFixed(2), chartW + 8, macdTop + macdH);

            const getMacdY = (val) => (macdTop + macdH/2) - (val / maxMacd) * (macdH / 2);

            let hoveredCandleIndex = -1;
            let finalLineX = -1;

            for (let i = 0; i < totalDisplay; i++) {
                const data = rawData[startIndex + i];
                const x = i * candleWidth + (candleWidth * 0.1);
                const w = candleWidth * 0.8;
                const isUp = data.close >= data.open;
                const color = isUp ? '#ff4a4a' : '#26a69a';

                ctx.strokeStyle = color; ctx.fillStyle = color;

                const yOpen = getPriceY(data.open); const yClose = getPriceY(data.close);
                ctx.beginPath(); ctx.moveTo(x + w / 2, getPriceY(data.high)); ctx.lineTo(x + w / 2, getPriceY(data.low)); ctx.stroke();
                ctx.fillRect(x, Math.min(yOpen, yClose), w, Math.abs(yOpen - yClose) || 2);

                const vH = ((data.volume || 0) / maxVol) * volH;
                ctx.fillStyle = isUp ? 'rgba(255, 74, 74, 0.45)' : 'rgba(38, 166, 154, 0.45)';
                ctx.fillRect(x, volTop + volH - vH, w, vH);

                const yZero = macdTop + macdH/2;
                const yOsc = getMacdY(data.macd_osc);
                ctx.fillStyle = data.macd_osc >= 0 ? 'rgba(255, 74, 74, 0.75)' : 'rgba(38, 166, 154, 0.75)';
                ctx.fillRect(x, Math.min(yZero, yOsc), w, Math.abs(yZero - yOsc) || 1);

                if (mouseX >= i * candleWidth && mouseX < (i + 1) * candleWidth) {
                    hoveredCandleIndex = startIndex + i;
                    finalLineX = x + w / 2;
                }
            }

            ctx.strokeStyle = '#ffeb3b'; ctx.lineWidth = 1.5; ctx.beginPath();
            let difStarted = false;
            for (let i = 0; i < totalDisplay; i++) {
                const data = rawData[startIndex + i]; if (data.macd_dif === undefined) continue;
                if (!difStarted) { ctx.moveTo(i * candleWidth + candleWidth/2, getMacdY(data.macd_dif)); difStarted = true; } 
                else { ctx.lineTo(i * candleWidth + candleWidth/2, getMacdY(data.macd_dif)); }
            }
            ctx.stroke();

            ctx.strokeStyle = '#00e5ff'; ctx.lineWidth = 1.5; ctx.beginPath();
            let deaStarted = false;
            for (let i = 0; i < totalDisplay; i++) {
                const data = rawData[startIndex + i]; if (data.macd_dem === undefined) continue;
                if (!deaStarted) { ctx.moveTo(i * candleWidth + candleWidth/2, getMacdY(data.macd_dem)); deaStarted = true; } 
                else { ctx.lineTo(i * candleWidth + candleWidth/2, getMacdY(data.macd_dem)); }
            }
            ctx.stroke();

            if (hoveredCandleIndex !== -1) {
                currentHoveredCandle = rawData[hoveredCandleIndex];
                updateTopInfoPanel(currentHoveredCandle);
            }

            if (mouseX >= 0 && mouseX <= chartW && mouseY >= 0 && mouseY <= height) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.35)';
                ctx.lineWidth = 1;
                ctx.setLineDash([4, 4]);

                if (finalLineX !== -1) {
                    ctx.beginPath(); ctx.moveTo(finalLineX, 0); ctx.lineTo(finalLineX, height); ctx.stroke();
                }

                ctx.beginPath(); ctx.moveTo(0, mouseY); ctx.lineTo(chartW, mouseY); ctx.stroke();
                ctx.setLineDash([]);

                if (mouseY <= mainH) {
                    let hoverPrice = maxPrice - (mouseY / mainH) * adjustedRange;
                    ctx.fillStyle = '#2962ff';
                    ctx.fillRect(chartW + 2, mouseY - 9, rightPadding - 4, 18);
                    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 11px sans-serif';
                    ctx.fillText(hoverPrice.toFixed(2), chartW + 8, mouseY + 4);
                } else if (mouseY >= volTop && mouseY <= volTop + volH) {
                    let hoverVol = Math.round(((volTop + volH - mouseY) / volH) * maxVol);
                    if (hoverVol >= 0) {
                        ctx.fillStyle = '#44454a';
                        ctx.fillRect(chartW + 2, mouseY - 9, rightPadding - 4, 18);
                        ctx.fillStyle = '#ffffff'; ctx.font = '10px sans-serif';
                        ctx.fillText(hoverVol.toLocaleString(), chartW + 5, mouseY + 4);
                    }
                } else if (mouseY >= macdTop && mouseY <= macdTop + macdH) {
                    let hoverMacd = ((macdTop + macdH/2 - mouseY) / (macdH / 2)) * maxMacd;
                    ctx.fillStyle = '#ba68c8';
                    ctx.fillRect(chartW + 2, mouseY - 9, rightPadding - 4, 18);
                    ctx.fillStyle = '#ffffff'; ctx.font = '11px sans-serif';
                    ctx.fillText(hoverMacd.toFixed(3), chartW + 8, mouseY + 4);
                }
            }

            if (currentHoveredCandle) {
                const hData = currentHoveredCandle;
                ctx.font = '12px sans-serif';
                
                let kColor = hData.close >= hData.open ? '#ff4a4a' : '#26a69a';
                ctx.fillStyle = '#e1e2e6'; ctx.fillText('開:', 10, 20);
                ctx.fillStyle = kColor;   ctx.fillText(hData.open.toFixed(2), 30, 20);
                ctx.fillStyle = '#e1e2e6'; ctx.fillText('高:', 85, 20);
                ctx.fillStyle = kColor;   ctx.fillText(hData.high.toFixed(2), 105, 20);
                ctx.fillStyle = '#e1e2e6'; ctx.fillText('低:', 160, 20);
                ctx.fillStyle = kColor;   ctx.fillText(hData.low.toFixed(2), 180, 20);
                ctx.fillStyle = '#e1e2e6'; ctx.fillText('收:', 235, 20);
                ctx.fillStyle = kColor;   ctx.fillText(hData.close.toFixed(2), 255, 20);
                
                ctx.fillStyle = '#ffb74d'; ctx.fillText(`MA5: ${hData.ma5 ? hData.ma5.toFixed(2) : '--'}`, 320, 20);
                ctx.fillStyle = '#ba68c8'; ctx.fillText(`MA20: ${hData.ma20 ? hData.ma20.toFixed(2) : '--'}`, 410, 20);
                ctx.fillStyle = '#4fc3f7'; ctx.fillText(`MA60: ${hData.ma60 ? hData.ma60.toFixed(2) : '--'}`, 505, 20);

                ctx.fillStyle = '#a1a4b0';
                ctx.fillText(`成交量(股): ${hData.volume ? hData.volume.toLocaleString() : '0'}`, 10, volTop - 6);

                ctx.fillStyle = '#ffeb3b'; ctx.fillText(`DIF(快): ${hData.macd_dif ? hData.macd_dif.toFixed(3) : '--'}`, 10, macdTop - 6);
                ctx.fillStyle = '#00e5ff'; ctx.fillText(`DEA(慢): ${hData.macd_dem ? hData.macd_dem.toFixed(3) : '--'}`, 130, macdTop - 6);
                
                let oscColor = hData.macd_osc >= 0 ? '#ff4a4a' : '#26a69a';
                ctx.fillStyle = '#e1e2e6'; ctx.fillText(`OSC(柱): `, 250, macdTop - 6);
                ctx.fillStyle = oscColor; ctx.fillText(`${hData.macd_osc ? hData.macd_osc.toFixed(3) : '--'}`, 300, macdTop - 6);
            }
        }

        function saveToHistory(symbol, market) {
            let history = JSON.parse(localStorage.getItem('stock_history')) || [];
            history = history.filter(item => item.symbol !== symbol);
            history.unshift({ symbol: symbol, market: market });
            if (history.length > 5) history = history.slice(0, 5);
            localStorage.setItem('stock_history', JSON.stringify(history));
            renderHistoryList();
        }

        function renderHistoryList() {
            const listEl = document.getElementById('historyList');
            let history = JSON.parse(localStorage.getItem('stock_history')) || [];
            if (history.length === 0) { listEl.innerHTML = '<div class="no-history">無搜尋紀錄</div>'; return; }
            listEl.innerHTML = '';
            history.forEach(item => {
                const li = document.createElement('li'); li.className = 'history-item';
                const marketText = item.market === 'TW' ? '台股' : '美股';
                li.innerText = `${item.symbol.replace('.TW', '')} (${marketText})`;
                li.onclick = () => {
                    document.getElementById('market').value = item.market;
                    document.getElementById('symbol').value = item.symbol.replace('.TW', '');
                    updateChart(true);
                };
                listEl.appendChild(li);
            });
        }

        const canvas = document.getElementById('stockCanvas');
        canvas.addEventListener('mousemove', (event) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = event.clientX - rect.left;
            mouseY = event.clientY - rect.top; 
            drawCanvasChart();
        });
        canvas.addEventListener('mouseleave', () => {
            mouseX = -1; mouseY = -1; 
            currentHoveredCandle = rawData[rawData.length - 1]; 
            updateTopInfoPanel(currentHoveredCandle);
            drawCanvasChart();
        });
        canvas.addEventListener('wheel', (event) => {
            event.preventDefault();
            if (event.deltaY > 0) { displayCount = Math.min(displayCount + 5, 300); } 
            else { displayCount = Math.max(displayCount - 5, 15); }
            drawCanvasChart(); 
        }, { passive: false });

        window.addEventListener('resize', drawCanvasChart);
        window.onload = () => { renderHistoryList(); updateChart(true); };
    </script>
</body>
</html>
